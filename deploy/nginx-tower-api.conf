# Nginx reverse proxy for the Tower Tracker / Pratibimb backend.
# Proxies api.varunaat.in -> Node app on localhost:5050, with WebSocket
# upgrade support for Socket.io. Certbot will inject the SSL (443) block.
#
# Install on the EC2 with:
#   sudo cp deploy/nginx-tower-api.conf /etc/nginx/sites-available/tower-api
#   sudo ln -sf /etc/nginx/sites-available/tower-api /etc/nginx/sites-enabled/tower-api
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.varunaat.in;

    # Allow larger image uploads (inspection photos) through the proxy.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;

        # WebSocket / Socket.io upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}
